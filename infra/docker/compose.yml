services:
  postgres:
    image: postgres:16-alpine
    container_name: app_web_parcela_postgres
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parcela}
      POSTGRES_USER: ${POSTGRES_USER:-parcela_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parcela_app_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parcela_app} -d ${POSTGRES_DB:-parcela}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
